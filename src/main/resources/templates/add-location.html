<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить локацию</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .hint { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
<h1>Добавить локацию</h1>
<form th:action="@{/locations}" th:object="${location}" method="post">
    <div class="form-group">
        <label for="address">Адрес</label>
        <input type="text" id="address" th:field="*{address}" required>
    </div>
    <div class="form-group">
        <button type="submit" class="btn btn-primary">Сохранить (геокодирование автоматически)</button>
        <a href="/locations" class="btn btn-secondary">Отмена</a>
    </div>
    <div class="hint">Если адрес с такими координатами уже существует, он будет добавлен как псевдоним</div>
</form>
</body>
</html>
