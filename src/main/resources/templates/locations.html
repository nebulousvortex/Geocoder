<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoRoute Planner API Tester</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .status-badge { padding: 5px 10px; border-radius: 4px; color: white; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .message { padding: 10px; margin: 10px 0; border-radius: 4px; }
    </style>
</head>
<body>
<div class="container">
    <h1 class="mb-4">GeoRoute Planner REST API Tester</h1>
    <p class="text-muted">Приложение должно быть запущено на http://localhost:8080</p>

    <div id="message" class="message d-none"></div>

    <div class="row mb-4">
        <div class="col-md-6">
            <h5>Добавить локацию</h5>
            <div class="input-group">
                <input type="text" id="addressInput" class="form-control" placeholder="Введите адрес">
                <button class="btn btn-primary" onclick="addLocation()">Добавить</button>
            </div>
        </div>
        <div class="col-md-6">
            <h5>Импорт из файла</h5>
            <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" class="form-control">
            <button class="btn btn-success mt-2" onclick="importFile()">Загрузить</button>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5>Список локаций</h5>
        <div>
            <button class="btn btn-secondary" onclick="loadLocations(0)">Обновить</button>
        </div>
    </div>

    <table id="locationsTable" class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Адрес</th>
            <th>Широта</th>
            <th>Долгота</th>
            <th>Псевдонимы</th>
            <th>Статус</th>
            <th>Дата создания</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>

    <nav id="pagination" class="mt-3"></nav>
</div>

<script>
    let currentPage = 0;
    const pageSize = 10;

    async function showMessage(text, type = 'success') {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = `message alert alert-${type === 'success' ? 'success' : 'danger'}`;
        msg.classList.remove('d-none');
        setTimeout(() => msg.classList.add('d-none'), 5000);
    }

    async function loadLocations(page = 0) {
        currentPage = page;
        try {
            const res = await fetch(`http://localhost:8080/api/locations?page=${page}&size=${pageSize}`);
            const data = await res.json();

            const tbody = document.querySelector('#locationsTable tbody');
            tbody.innerHTML = '';

            data.content.forEach(loc => {
                const tr = document.createElement('tr');
                const statusHtml = loc.statusName ?
                    `<span class="status-badge" style="background-color: ${loc.statusColor}">${loc.statusName}</span>` :
                    '<span class="status-badge" style="background-color: #808080">Неизвестно</span>';

                tr.innerHTML = `
                    <td>${loc.id}</td>
                    <td>${loc.address}</td>
                    <td>${loc.latitude !== null ? loc.latitude : '-'}</td>
                    <td>${loc.longitude !== null ? loc.longitude : '-'}</td>
                    <td>${loc.aliases || '-'}</td>
                    <td>${statusHtml}</td>
                    <td>${loc.createdAt ? new Date(loc.createdAt).toLocaleString('ru-RU') : '-'}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="deleteLocation(${loc.id})">Удалить</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            renderPagination(data);
        } catch (e) {
            showMessage('Ошибка загрузки: ' + e.message, 'danger');
        }
    }

    function renderPagination(data) {
        const nav = document.getElementById('pagination');
        let html = '<ul class="pagination justify-content-center">';

        if (!data.first) {
            html += `<li class="page-item"><a class="page-link" href="#" onclick="loadLocations(${data.number - 1}); return false;">Пред.</a></li>`;
        }

        for (let i = 0; i < data.totalPages; i++) {
            html += `<li class="page-item ${i === data.number ? 'active' : ''}">
                <a class="page-link" href="#" onclick="loadLocations(${i}); return false;">${i + 1}</a>
            </li>`;
        }

        if (!data.last) {
            html += `<li class="page-item"><a class="page-link" href="#" onclick="loadLocations(${data.number + 1}); return false;">След.</a></li>`;
        }

        html += '</ul>';
        nav.innerHTML = html;
    }

    async function addLocation() {
        const address = document.getElementById('addressInput').value.trim();
        if (!address) {
            showMessage('Введите адрес', 'danger');
            return;
        }

        try {
            const res = await fetch('http://localhost:8080/api/locations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ address })
            });

            if (res.ok) {
                showMessage('Локация добавлена');
                document.getElementById('addressInput').value = '';
                loadLocations(currentPage);
            } else {
                showMessage('Ошибка добавления', 'danger');
            }
        } catch (e) {
            showMessage('Ошибка: ' + e.message, 'danger');
        }
    }

    async function deleteLocation(id) {
        if (!confirm('Удалить локацию?')) return;

        try {
            const res = await fetch(`http://localhost:8080/api/locations/${id}`, { method: 'DELETE' });
            if (res.ok) {
                showMessage('Локация удалена');
                loadLocations(currentPage);
            } else {
                showMessage('Ошибка удаления', 'danger');
            }
        } catch (e) {
            showMessage('Ошибка: ' + e.message, 'danger');
        }
    }

    async function importFile() {
        const fileInput = document.getElementById('fileInput');
        if (!fileInput.files.length) {
            showMessage('Выберите файл', 'danger');
            return;
        }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        try {
            const res = await fetch('http://localhost:8080/api/locations/import', {
                method: 'POST',
                body: formData
            });

            const data = await res.json();
            if (res.ok) {
                showMessage(data.message || 'Импорт запущен');
                fileInput.value = '';
                setTimeout(() => loadLocations(0), 1500);
            } else {
                showMessage(data.error || 'Ошибка импорта', 'danger');
            }
        } catch (e) {
            showMessage('Ошибка: ' + e.message, 'danger');
        }
    }

    window.onload = () => loadLocations(0);
</script>
</body>
</html>
