<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Локации</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 50px auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .status-badge { padding: 5px 10px; border-radius: 4px; color: white; font-size: 12px; }
        .btn { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-primary { background-color: #007bff; color: white; }
        .aliases { font-size: 12px; color: #666; }
    </style>
</head>
<body>
<h1>Локации</h1>

<button type="button" class="btn btn-primary mb-3 me-2" data-bs-toggle="modal" data-bs-target="#addModal">Добавить вручную</button>
<button type="button" class="btn btn-success mb-3" data-bs-toggle="modal" data-bs-target="#importModal">Импорт из файла</button>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Адрес</th>
        <th>Псевдонимы</th>
        <th>Широта</th>
        <th>Долгота</th>
        <th>Статус</th>
        <th>Дата создания</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="location : ${locationsPage.content}">
        <td th:text="${location.id}"></td>
        <td th:text="${location.address}"></td>
        <td class="aliases" th:text="${location.aliases != null ? location.aliases : '-'}"></td>
        <td th:text="${location.latitude != null ? location.latitude : '-'}"></td>
        <td th:text="${location.longitude != null ? location.longitude : '-'}"></td>
        <td>
                    <span class="status-badge"
                          th:style="${location.status != null ? 'background-color: ' + location.status.color : 'background-color: #808080'}"
                          th:text="${location.status != null ? location.status.name : 'Неизвестно'}">
                    </span>
        </td>
        <td th:text="${#temporals.format(location.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
        <td>
            <form th:action="@{/locations/delete/{id}(id=${location.id})}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-danger">Удалить</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<p class="text-center mb-3">
    Всего локаций: <span th:text="${locationsPage.totalElements}"></span>
    (Страница <span th:text="${locationsPage.number + 1}"></span> из <span th:text="${locationsPage.totalPages}"></span>)
</p>

<nav aria-label="Пагинация локаций">
    <ul class="pagination justify-content-center">
        <li th:class="${locationsPage.first ? 'page-item disabled' : 'page-item'}">
            <a th:if="${!locationsPage.first}" class="page-link" th:href="@{/locations(page=${locationsPage.number - 1}, size=${locationsPage.size})}">Пред.</a>
            <span th:if="${locationsPage.first}" class="page-link">Пред.</span>
        </li>

        <th:block th:each="p : ${#numbers.sequence(0, locationsPage.totalPages - 1)}">
            <li th:class="${p == locationsPage.number ? 'page-item active' : 'page-item'}">
                <a class="page-link" th:href="@{/locations(page=${p}, size=${locationsPage.size})}" th:text="${p + 1}"></a>
            </li>
        </th:block>

        <li th:class="${locationsPage.last ? 'page-item disabled' : 'page-item'}">
            <a th:if="${!locationsPage.last}" class="page-link" th:href="@{/locations(page=${locationsPage.number + 1}, size=${locationsPage.size})}">След.</a>
            <span th:if="${locationsPage.last}" class="page-link">След.</span>
        </li>
    </ul>
</nav>

<p><a href="/">На главную</a></p>

<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Добавить локацию</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/locations}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Адрес</label>
                        <input type="text" class="form-control" name="address" required>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="importModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Импорт адресов</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form th:action="@{/locations/import}" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Файл (CSV или Excel)</label>
                        <input type="file" class="form-control" name="file" accept=".csv,.xlsx,.xls" required>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                        <button type="submit" class="btn btn-success">Загрузить</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
